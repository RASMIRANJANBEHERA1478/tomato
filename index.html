<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spicy Tomato - Online Ordering</title>
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #e84118;
            --secondary: #2ed573;
            --secondary-hover: #26af5f;
            --dark: #2f3542;
            --light: #f1f2f6;
            --white: #ffffff;
            --text-muted: #747d8c;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f7f9fc;
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* Modern Glass Header */
        header {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-cart-btn {
            background: rgba(255, 71, 87, 0.1);
            color: var(--primary);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
        }

        /* Custom Responsive Image Banner Styles */
        .hero-banner-image-container {
            width: 100%;
            background-color: #ffdb15; /* Matches the vibrant yellow in the image */
            max-height: 280px; 
            overflow: hidden;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .responsive-banner-img {
            width: 100%;
            height: auto;
            max-width: 1200px; /* Keeps the logo centered and sharp on large screens */
            object-fit: contain;
            display: block;
        }

        @media (max-width: 600px) {
            .hero-banner-image-container {
                max-height: 180px;
            }
        }

        /* Layout Grid */
        .main-container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto 4rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 2.2fr 1.3fr;
            gap: 2.5rem;
            flex: 1;
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Food Menu Cards */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
        }

        .menu-item {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            transition: var(--transition);
        }

        .menu-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(255, 71, 87, 0.1);
        }

        .item-details h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: var(--dark);
        }

        .item-details p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f1f2f6;
        }

        .price {
            font-weight: 700;
            color: var(--dark);
            font-size: 1.3rem;
        }

        .btn-add {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.2);
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
            transform: scale(1.03);
        }

        /* Cart Area */
        .cart-card {
            background: var(--white);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 110px;
            height: fit-content;
        }

        .cart-items {
            max-height: 280px;
            overflow-y: auto;
            margin: 1.5rem 0;
            padding-right: 0.2rem;
        }

        .cart-items::-webkit-scrollbar {
            width: 4px;
        }
        .cart-items::-webkit-scrollbar-thumb {
            background: #dfe4ea;
            border-radius: 10px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #f1f2f6;
        }

        .cart-item-info {
            max-width: 60%;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--dark);
        }

        .cart-item-price {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--light);
            padding: 0.3rem 0.6rem;
            border-radius: var(--radius-sm);
        }

        .cart-item-actions button {
            background: transparent;
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-weight: 700;
            color: var(--dark);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-total {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            margin: 1.5rem 0;
            padding-top: 1rem;
            border-top: 2px dashed #dfe4ea;
            color: var(--dark);
        }

        /* Checkout Form Inputs */
        .checkout-form input, .checkout-form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid #dfe4ea;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            background: #fafafa;
            transition: var(--transition);
            outline: none;
        }

        .checkout-form input:focus, .checkout-form textarea:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.1);
        }

        .btn-checkout {
            width: 100%;
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.2);
            margin-top: 0.5rem;
        }

        .btn-checkout:hover {
            background-color: var(--secondary-hover);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(46, 213, 115, 0.3);
        }

        .empty-message {
            color: var(--text-muted);
            text-align: center;
            padding: 2rem 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo"><span>🍅</span> The Spicy Tomato</div>
            <button class="nav-cart-btn" id="cart-count-nav">Cart: ₹0</button>
        </div>
    </header>

    <!-- Custom Image Banner Section -->
    <div class="hero-banner-image-container">
        <img src="Banner.png.png" alt="The Spicy Tomato Banner" class="responsive-banner-img">
    </div>

    <main class="main-container">
        <!-- Menu Section -->
        <section style="overflow: hidden;">
            <h2 class="section-title">🍛 Explore Menu</h2>
            <div class="menu-grid" id="menu-container">
                <!-- JavaScript populates items here -->
            </div>
        </section>

        <!-- Cart System Layout -->
        <aside>
            <div class="cart-card">
                <h2 class="section-title" style="margin-bottom: 0.5rem;">🛍️ Your Order</h2>
                <div class="cart-items" id="cart-items-container">
                    <p class="empty-message">Your cart is empty. Pick some delicious meals to get started!</p>
                </div>
                
                <div class="cart-total">
                    <span>Total Amount:</span>
                    <span id="cart-total-amount">₹0</span>
                </div>

                <form class="checkout-form" id="checkout-form" onsubmit="handleCheckout(event)">
                    <input type="text" id="cust-name" placeholder="Enter Your Name" required>
                    <input type="text" id="cust-phone" placeholder="Enter Phone Number" required>
                    <textarea id="cust-address" placeholder="Complete Delivery Address (with landmarks)" rows="3" required></textarea>
                    <button type="submit" class="btn-checkout">Place Order via WhatsApp</button>
                </form>
            </div>
        </aside>
    </main>

    <script>
        // CONFIGURATION: Replace with your actual WhatsApp number (including country code, e.g., 91 for India)
        const WHATSAPP_NUMBER = "9692217371"; 

        // Initialized Menu Array Data
        const menuItems = [
            { id: 1, name: "Paneer Butter Masala", price: 240, desc: "Rich and creamy cottage cheese dish slow-cooked in a classic velvet tomato butter gravy." },
            { id: 2, name: "Chicken Dum Biryani", price: 280, desc: "Fragrant premium basmati rice cooked layered with juicy chicken and secret house spices." },
            { id: 3, name: "Dal Makhani Special", price: 190, desc: "Authentic slow-cooked black lentils prepared overnight with churned butter and fresh cream." },
            { id: 4, name: "Butter Naan", price: 50, desc: "Soft, traditional leavened flatbread freshly baked in a tandoor clay oven with glaze." },
            { id: 5, name: "Crispy Masala Dosa", price: 120, desc: "Golden-crisped rice crepe layered with a tempered potato filling, sambar and chutneys." },
            { id: 6, name: "Gulab Jamun (2 Pcs)", price: 70, desc: "Traditional sweet melt-in-the-mouth milk dumplings soaked in a warm cardamom syrup." }
        ];

        let cart = {};

        // Render Clean Layout Cards
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = menuItems.map(item => `
                <div class="menu-item">
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                    </div>
                    <div class="item-bottom">
                        <span class="price">₹${item.price}</span>
                        <button class="btn-add" onclick="addToCart(${item.id})">Add Item</button>
                    </div>
                </div>
            `).join('');
        }

        // Cart Actions Execution
        function addToCart(id) {
            const item = menuItems.find(p => p.id === id);
            if (cart[id]) {
                cart[id].quantity += 1;
            } else {
                cart[id] = { ...item, quantity: 1 };
            }
            updateCartUI();
        }

        function changeQuantity(id, delta) {
            if (!cart[id]) return;
            cart[id].quantity += delta;
            if (cart[id].quantity <= 0) {
                delete cart[id];
            }
            updateCartUI();
        }

        // Complete UI Render Update
        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const totalAmountSpan = document.getElementById('cart-total-amount');
            const navCount = document.getElementById('cart-count-nav');
            
            const cartArray = Object.values(cart);
            
            if (cartArray.length === 0) {
                container.innerHTML = '<p class="empty-message">Your cart is empty. Pick some delicious meals to get started!</p>';
                totalAmountSpan.innerText = '₹0';
                navCount.innerText = 'Cart: ₹0';
                return;
            }

            let total = 0;
            container.innerHTML = cartArray.map(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">₹${item.price} × ${item.quantity}</div>
                        </div>
                        <div class="cart-item-actions">
                            <button type="button" onclick="changeQuantity(${item.id}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button type="button" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');

            totalAmountSpan.innerText = `₹${total}`;
            navCount.innerText = `Cart: ₹${total}`;
        }

        // Process Orders Securely via WhatsApp
        function handleCheckout(e) {
            e.preventDefault();
            const cartArray = Object.values(cart);
            if (cartArray.length === 0) {
                alert("Your cart is empty! Add some delicious dishes before checking out.");
                return;
            }

            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;

            let total = 0;
            let textMessage = `🚨 *NEW FOOD ORDER - THE SPICY TOMATO* 🚨\n\n`;
            textMessage += `👤 *Customer Details:*\n• *Name:* ${name}\n• *Phone:* ${phone}\n• *Address:* ${address}\n\n`;
            textMessage += `🛒 *Items Ordered:*\n`;
            
            cartArray.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                textMessage += `• ${item.name} × ${item.quantity} (₹${itemTotal})\n`;
            });

            textMessage += `\n💰 *Grand Total:* ₹${total}\n\n🟩 Please reply to confirm availability and prep time!`;
            
            const encodedMessage = encodeURIComponent(textMessage);
            const whatsappUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');
        }

        // Initialize Menu View
        renderMenu();
    </script>
</body>
</html>
